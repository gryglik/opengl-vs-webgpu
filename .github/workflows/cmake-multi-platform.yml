name: CMake Multi Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

        include:
          - os: ubuntu-latest
            compiler: gcc

          - os: macos-latest
            compiler: clang

          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # ---------------- DEPENDENCIES ----------------
    - name: Install dependencies (Ubuntu only)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install dependencies (all)
      run: pip install jinja2 --break-system-packages

    # ---------------- CONFIGURE ----------------
    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DUSE_WAYLAND=ON -DUSE_X11=OFF -S .

    # ---------------- BUILD ----------------
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
