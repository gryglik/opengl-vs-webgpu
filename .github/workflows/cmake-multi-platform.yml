name: CMake Multi Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

        include:
          - os: ubuntu-latest
            compiler: gcc

          - os: macos-latest
            compiler: clang

          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - uses: microsoft/setup-msbuild@v3
      if: runner.os == 'Windows'

    # ---------------- DEPENDENCIES ----------------
    - name: Install dependencies (Ubuntu only)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install dependencies (all)
      run: |
        python3 --version
        pip3 install jinja2 --break-system-packages

    # ---------------- CONFIGURE ----------------
    - name: Configure CMake (Unix)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      run: |
        cmake -B build -DPython3_EXECUTABLE=python3 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DUSE_WAYLAND=ON -DUSE_X11=OFF -S .
    
    - name: Configure cmake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DPython3_EXECUTABLE=python3 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -S . -A x64

    # ---------------- BUILD ----------------
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
